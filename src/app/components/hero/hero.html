<section id="hero"
    class="min-h-screen section-pad grid grid-cols-2 max-[920px]:grid-cols-1 items-center gap-20 overflow-hidden">

    <div class="relative z-[2] animate-fade-up-1 max-w-[620px]">
        <h1
            class="font-syne font-black leading-[.93] tracking-[-0.04em] mb-5 text-[clamp(3.2rem,5.2vw,5.8rem)] t-fg animate-fade-up-2">
            Your Name<br>
            <span class="text-blue-glow block">Here.</span>
        </h1>

        <p class="font-mono text-[.88rem] t-slate mb-8 tracking-[.04em] uppercase animate-fade-up-3">
            Full-Stack Developer · <span class="text-teal">Mobile &amp; Web</span>
        </p>

        <p class="text-base leading-relaxed t-muted max-w-[480px] mb-12 animate-fade-up-4">
            I design and build clean, scalable applications, from efficient backend APIs to refined mobile experiences,
            with a focus on performance, maintainability, and long-term reliability.
        </p>

        <div class="flex items-center gap-4 flex-wrap animate-fade-up-5">
            <a href="#contact" class="group relative inline-flex items-center gap-2.5 px-7 py-3.5 rounded-full font-mono text-[.82rem] tracking-[.06em] uppercase font-medium
                       bg-blue-main hover:bg-blue-dark text-white
                       shadow-[0_0_20px_rgba(37,99,235,0.35)] hover:shadow-[0_0_32px_rgba(37,99,235,0.55)]
                       transition-all duration-400 overflow-hidden">

                <span class="absolute inset-0 -translate-x-full group-hover:translate-x-full transition-transform duration-700
                             bg-gradient-to-r from-transparent via-white/10 to-transparent pointer-events-none"></span>
                <span>Contact Me</span>
                <svg class="size-3.5 transition-transform duration-300 group-hover:translate-x-0.5 group-hover:-translate-y-0.5"
                    viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 12L12 2M12 2H5M12 2V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </a>

            <a href="#work" class="group inline-flex items-center gap-2 px-7 py-3.5 rounded-full font-mono text-[.82rem] tracking-[.06em] uppercase font-medium
                       border border-border/50 hover:border-blue-glow/40 t-muted hover:text-blue-glow
                       transition-all duration-400">
                <span>View Work</span>
                <svg class="size-3 opacity-60 group-hover:opacity-100 transition-all duration-300 group-hover:translate-x-0.5"
                    viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 6H10M10 6L7 3M10 6L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </a>
        </div>
    </div>

    <div class="hide-mobile relative z-[2] flex justify-center items-center animate-fade-up-r">

        <div class="relative size-[320px]">

            <div class="absolute inset-[-8px] rounded-full blur-[15px] bg-blue-main/15 opacity-80"></div>

            <div class="absolute inset-[-3px] rounded-full p-[1px]
                        bg-gradient-to-b from-blue-glow/60 via-blue-dark to-blue-deep/30
                        shadow-[0_0_25px_rgba(37,99,235,0.2)]">
                <div class="w-full h-full rounded-full bg-ink"></div>
            </div>

            <div class="absolute inset-[3px] rounded-full overflow-hidden border border-border/50
                        shadow-[inset_0_4px_12px_rgba(0,0,0,0.5)]"
                style="background:linear-gradient(160deg,#0c1445 0%,#1e3a8a 55%,#0f172a 100%)">

            </div>
        </div>
    </div>
</section>
