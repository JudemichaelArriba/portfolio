<p>experience-modal works!</p>
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
    <div class="bg-[#0a0f1a] border border-blue-main/30 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h3 class="font-syne font-bold text-xl t-fg">{{ mode === 'add' ? 'Add Experience' : 'Edit Experience' }}
            </h3>
            <button (click)="close.emit()" class="t-muted hover:text-white">✕</button>
        </div>

        <form (ngSubmit)="onSubmit()" class="p-6 flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="font-mono text-[10px] uppercase t-slate">Job/Title</label>
                    <input [(ngModel)]="experience.title" name="title" required
                        class="bg-white/5 border border-white/10 rounded-lg p-2.5 outline-none focus:border-blue-main t-fg text-sm">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-mono text-[10px] uppercase t-slate">Company</label>
                    <input [(ngModel)]="experience.company" name="company" required
                        class="bg-white/5 border border-white/10 rounded-lg p-2.5 outline-none focus:border-blue-main t-fg text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="font-mono text-[10px] uppercase t-slate">Badge (e.g. 3rd Year)</label>
                    <input [(ngModel)]="experience.badge_label" name="badge"
                        class="bg-white/5 border border-white/10 rounded-lg p-2.5 outline-none focus:border-blue-main t-fg text-sm">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-mono text-[10px] uppercase t-slate">Date Range</label>
                    <input [(ngModel)]="experience.date_range" name="date"
                        class="bg-white/5 border border-white/10 rounded-lg p-2.5 outline-none focus:border-blue-main t-fg text-sm">
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <label class="font-mono text-[10px] uppercase t-slate">Description</label>
                <textarea [(ngModel)]="experience.description" name="description" rows="4"
                    class="bg-white/5 border border-white/10 rounded-lg p-2.5 outline-none focus:border-blue-main t-fg text-sm resize-none"></textarea>
            </div>

            <div class="flex justify-end gap-3 mt-4">
                <button type="button" (click)="close.emit()"
                    class="px-4 py-2 font-mono text-[10px] uppercase t-slate hover:text-white">Cancel</button>
                <button type="submit" [disabled]="isSaving"
                    class="px-6 py-2 rounded-md bg-blue-main text-white font-mono text-[10px] uppercase tracking-widest disabled:opacity-50">
                    {{ isSaving ? 'Saving...' : 'Save Experience' }}
                </button>
            </div>
        </form>
    </div>
</div>
