<section id="projects" class="section-pad">
    <div class="flex justify-between items-end mb-12">
        <div>
            <div
                class="font-mono text-[.7rem] text-blue-glow uppercase tracking-[.14em] mb-3 flex items-center gap-3 section-label">
                Work
            </div>
            <h2 class="font-syne font-black text-[clamp(2rem,3.5vw,3rem)] tracking-tight leading-[1.1] mb-4 t-fg">
                Featured Projects</h2>
            <p class="t-sub text-[.94rem] leading-7 max-w-[520px]">A selection of things I've built. More on GitHub.</p>
        </div>

        <button *ngIf="isLoggedIn()" (click)="openAddModal()"
            class="px-5 py-2.5 rounded-full bg-blue-600/10 border border-blue-500/20 text-blue-500 font-mono text-[11px] uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all duration-300">
            + Add Project
        </button>
    </div>

    <div class="grid grid-cols-2 max-[920px]:grid-cols-1 gap-7 items-stretch">
        @for (proj of projects(); track proj.id; let i = $index) {
        <div class="reveal tl-item h-full" [class.tl-exit]="deletingIds().has(proj.id)"
            [style.transition-delay]="(i * 0.1) + 's'">

            <div
                class="t-card rounded-[18px] overflow-hidden backdrop-blur-[12px] group hover:-translate-y-[7px] hover:border-blue-main/38 hover:shadow-[0_24px_64px_rgba(37,99,235,.12)] transition-all duration-300 relative flex flex-col h-full">

                <div *ngIf="isLoggedIn()"
                    class="absolute top-4 right-4 z-10 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button (click)="openEditModal(proj)"
                        class="p-2 rounded-lg bg-black/50 text-white backdrop-blur-md hover:bg-blue-600 transition-colors">✎</button>
                    <button (click)="handleDelete(proj)"
                        class="p-2 rounded-lg bg-black/50 text-white backdrop-blur-md hover:bg-red-600 transition-colors">🗑</button>
                </div>

                <div class="h-[230px] shrink-0 relative flex flex-col items-center justify-center gap-2.5 overflow-hidden"
                    [style.background]="!proj.image ? 'linear-gradient(140deg, #0c1445 0%, #1e3a8a 55%, #0f172a 100%)' : 'none'">

                    <span
                        class="absolute top-4 left-[18px] z-10 font-mono text-[.66rem] text-white/30 tracking-[.08em]">
                        0{{i + 1}} — {{ proj.title }}
                    </span>

                    @if (proj.image) {
                    <img [src]="proj.image"
                        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    } @else {
                    <span class="text-[3rem] opacity-55">🚀</span>
                    }
                </div>

                <div class="p-7 flex flex-col flex-1">
                    <div class="font-syne font-bold text-[1.25rem] t-fg mb-2.5 tracking-tight line-clamp-1">
                        {{ proj.title }}
                    </div>

                    <p class="text-[.86rem] t-muted leading-[1.72] mb-6 line-clamp-3 flex-1">
                        {{ proj.description }}
                    </p>

                    <div class="flex items-center justify-between mt-auto">
                        <a [href]="proj.github_url" target="_blank"
                            class="font-mono text-[.7rem] t-slate no-underline flex items-center gap-1.5 tracking-[.06em] hover:text-blue-glow transition-colors duration-200">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
                            </svg>Source Code
                        </a>
                    </div>
                </div>
            </div>
        </div>
        }
    </div>
</section>

<app-projects-modal *ngIf="showModal()" [mode]="modalMode()" [project]="selectedProject()" [isSaving]="isSaving()"
    (close)="showModal.set(false)" (save)="handleSave($event)">
</app-projects-modal>
